<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>GestEscolar – Plataforma de Gestão Escolar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
/* =============================================
   GESTESCOLAR – ESTILOS PRINCIPAIS
   ============================================= */

/* ---------- Reset e Base ---------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary:    #1a73e8;
  --primary-dk: #1557b0;
  --secondary:  #34a853;
  --danger:     #ea4335;
  --warning:    #fbbc04;
  --info:       #4285f4;
  --bg:         #f0f4f8;
  --surface:    #ffffff;
  --sidebar-bg: #0d1b2a;
  --sidebar-tx: #b0bec5;
  --sidebar-ac: #1a73e8;
  --text:       #202124;
  --text-muted: #5f6368;
  --border:     #dadce0;
  --radius:     8px;
  --shadow:     0 2px 8px rgba(0,0,0,.12);
  --shadow-lg:  0 8px 24px rgba(0,0,0,.16);
  --font:       'Segoe UI', system-ui, sans-serif;
}

html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; }
#app { height: 100%; }
a { color: var(--primary); text-decoration: none; }
button { cursor: pointer; font-family: var(--font); }
input, select, textarea { font-family: var(--font); }
img { max-width: 100%; }

/* ---------- Layout Principal ---------- */
.layout {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ---------- Sidebar ---------- */
.sidebar {
  width: 240px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
  transition: width .25s;
}
.sidebar-brand {
  padding: 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  display: flex;
  align-items: center;
  gap: 10px;
}
.sidebar-brand .brand-icon {
  width: 36px; height: 36px;
  background: var(--primary);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 18px;
}
.sidebar-brand .brand-name {
  color: #fff; font-weight: 700; font-size: 16px;
}
.sidebar-brand .brand-sub {
  color: var(--sidebar-tx); font-size: 11px;
}
.sidebar-nav { flex: 1; padding: 12px 0; }
.nav-section-title {
  color: rgba(255,255,255,.35);
  font-size: 10px; font-weight: 700;
  letter-spacing: 1px;
  padding: 12px 16px 4px;
  text-transform: uppercase;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  color: var(--sidebar-tx);
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all .2s;
  font-size: 13.5px;
}
.nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
.nav-item.active { background: rgba(26,115,232,.15); color: #fff; border-left-color: var(--primary); }
.nav-item i { width: 18px; text-align: center; font-size: 14px; }
.sidebar-footer {
  padding: 16px;
  border-top: 1px solid rgba(255,255,255,.08);
}
.sidebar-user {
  display: flex; align-items: center; gap: 10px;
  padding: 8px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background .2s;
}
.sidebar-user:hover { background: rgba(255,255,255,.06); }
.sidebar-user .avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px;
}
.sidebar-user .user-info { flex: 1; min-width: 0; }
.sidebar-user .user-name { color: #fff; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-user .user-role { color: var(--sidebar-tx); font-size: 11px; }
.btn-logout { background: none; border: none; color: var(--sidebar-tx); padding: 4px; font-size: 14px; }
.btn-logout:hover { color: var(--danger); }

/* ---------- Conteúdo Principal ---------- */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.topbar-title { font-size: 18px; font-weight: 700; }
.topbar-actions { display: flex; align-items: center; gap: 12px; }
.page-content { flex: 1; overflow-y: auto; padding: 24px; }

/* ---------- Cartões ---------- */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  margin-bottom: 20px;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.card-title { font-size: 15px; font-weight: 700; }

/* ---------- Stats ---------- */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  display: flex; align-items: center; gap: 14px;
}
.stat-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.stat-icon.blue   { background: #e8f0fe; color: #1a73e8; }
.stat-icon.green  { background: #e6f4ea; color: #34a853; }
.stat-icon.red    { background: #fce8e6; color: #ea4335; }
.stat-icon.yellow { background: #fef9e3; color: #f9ab00; }
.stat-icon.purple { background: #f3e8fd; color: #8e24aa; }
.stat-value { font-size: 24px; font-weight: 800; line-height: 1; }
.stat-label { color: var(--text-muted); font-size: 12px; margin-top: 4px; }

/* ---------- Botões ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius);
  border: none;
  font-size: 13.5px; font-weight: 600;
  transition: all .2s;
  cursor: pointer;
}
.btn-primary   { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dk); }
.btn-secondary { background: var(--secondary); color: #fff; }
.btn-secondary:hover { background: #2d9148; }
.btn-danger    { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #c62828; }
.btn-outline   { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); background: #e8f0fe; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon { width: 32px; height: 32px; padding: 0; justify-content: center; border-radius: 50%; }
.btn-present { background: #e6f4ea; color: #2d9148; border: 1.5px solid #a8d5b5; }
.btn-present:hover, .btn-present.active { background: #34a853; color: #fff; }
.btn-absent  { background: #fce8e6; color: #c62828; border: 1.5px solid #f4aea8; }
.btn-absent:hover, .btn-absent.active  { background: #ea4335; color: #fff; }

/* ---------- Tabela ---------- */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th {
  background: #f8f9fa;
  padding: 10px 14px;
  text-align: left;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text-muted);
  letter-spacing: .5px;
  border-bottom: 2px solid var(--border);
}
tbody td {
  padding: 12px 14px;
  border-bottom: 1px solid #f0f0f0;
  font-size: 13.5px;
  vertical-align: middle;
}
tbody tr:hover { background: #fafbff; }
tbody tr:last-child td { border-bottom: none; }

/* ---------- Badge ---------- */
.badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .5px;
}
.badge-blue   { background: #e8f0fe; color: #1a73e8; }
.badge-green  { background: #e6f4ea; color: #2d9148; }
.badge-red    { background: #fce8e6; color: #c62828; }
.badge-yellow { background: #fef9e3; color: #b06000; }
.badge-purple { background: #f3e8fd; color: #7b1fa2; }
.badge-gray   { background: #f1f3f4; color: #5f6368; }

/* ---------- Formulários ---------- */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-muted); }
.form-control {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  transition: border-color .2s;
  background: var(--surface);
}
.form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,115,232,.12); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.form-section-title {
  font-size: 13px; font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin: 20px 0 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* ---------- Modal ---------- */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  animation: fadeIn .15s;
}
.modal {
  background: var(--surface);
  border-radius: 12px;
  width: 90%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slideUp .2s;
}
.modal-lg { max-width: 800px; }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: var(--surface);
  z-index: 1;
}
.modal-title { font-size: 17px; font-weight: 700; }
.modal-close { background: none; border: none; font-size: 20px; color: var(--text-muted); padding: 4px; border-radius: 50%; }
.modal-close:hover { background: #f1f3f4; color: var(--text); }
.modal-body { padding: 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 10px;
  position: sticky; bottom: 0;
  background: var(--surface);
}

/* ---------- Login ---------- */
.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0d1b2a 0%, #1a3a5c 100%);
  padding: 20px;
}
.login-card {
  background: var(--surface);
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow-lg);
}
.login-logo {
  text-align: center;
  margin-bottom: 28px;
}
.login-logo .logo-icon {
  width: 64px; height: 64px;
  background: var(--primary);
  border-radius: 16px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 30px; color: #fff;
  margin-bottom: 12px;
}
.login-logo h1 { font-size: 24px; font-weight: 800; color: var(--text); }
.login-logo p  { color: var(--text-muted); font-size: 13px; }
.login-divider {
  text-align: center;
  margin: 20px 0;
  position: relative;
}
.login-divider::before {
  content: '';
  position: absolute; left: 0; right: 0; top: 50%;
  height: 1px; background: var(--border);
}
.login-divider span {
  background: var(--surface);
  padding: 0 12px;
  color: var(--text-muted);
  font-size: 12px;
  position: relative;
}
.demo-accounts { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
.demo-btn {
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: #fafbff;
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
  transition: all .2s;
  font-size: 12.5px;
}
.demo-btn:hover { border-color: var(--primary); background: #e8f0fe; }
.demo-btn .demo-role { font-weight: 700; }
.demo-btn .demo-cred { color: var(--text-muted); font-size: 11px; }

/* ---------- Alertas ---------- */
.alert {
  padding: 12px 16px;
  border-radius: var(--radius);
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
  font-size: 13.5px;
}
.alert-danger  { background: #fce8e6; color: #c62828; border-left: 4px solid var(--danger); }
.alert-success { background: #e6f4ea; color: #2d9148; border-left: 4px solid var(--secondary); }
.alert-info    { background: #e8f0fe; color: #1a73e8; border-left: 4px solid var(--primary); }
.alert-warning { background: #fef9e3; color: #b06000; border-left: 4px solid var(--warning); }

/* ---------- Tabs ---------- */
.tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 20px; gap: 4px; }
.tab-btn {
  padding: 10px 20px;
  background: none; border: none;
  font-size: 13.5px; font-weight: 600;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all .2s;
  cursor: pointer;
}
.tab-btn:hover { color: var(--primary); }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ---------- Financial ---------- */
.financial-summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}
.fin-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
}
.fin-card-label { color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.fin-card-value { font-size: 26px; font-weight: 800; margin: 6px 0 2px; }
.fin-card-sub   { font-size: 12px; color: var(--text-muted); }
.fin-card.saldo { border-top: 4px solid var(--secondary); }
.fin-card.saldo .fin-card-value { color: var(--secondary); }
.fin-card.pagar { border-top: 4px solid var(--danger); }
.fin-card.pagar .fin-card-value { color: var(--danger); }
.fin-card.receber { border-top: 4px solid var(--primary); }
.fin-card.receber .fin-card-value { color: var(--primary); }
.fin-card.taxa   { border-top: 4px solid var(--warning); }
.fin-card.taxa   .fin-card-value { color: #b06000; }

/* ---------- Presença ---------- */
.attendance-row { display: flex; align-items: center; gap: 10px; }
.attendance-btns { display: flex; gap: 6px; }

/* ---------- Boletim ---------- */
.grade-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 36px; height: 36px;
  border-radius: 8px;
  font-weight: 800; font-size: 14px;
}
.grade-A { background: #e6f4ea; color: #2d9148; }
.grade-B { background: #e8f0fe; color: #1557b0; }
.grade-C { background: #fef9e3; color: #b06000; }
.grade-D { background: #fce8e6; color: #c62828; }
.grade-F { background: #f1f3f4; color: #5f6368; }

/* ---------- PIX ---------- */
.pix-code-box {
  background: #f8f9fa;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  font-family: monospace;
  font-size: 12px;
  word-break: break-all;
  margin: 12px 0;
}

/* ---------- Mensagens ---------- */
.msg-list { display: flex; flex-direction: column; gap: 8px; }
.msg-item {
  background: #f8f9fa;
  border-radius: var(--radius);
  padding: 12px 14px;
  border-left: 4px solid var(--primary);
}
.msg-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
.msg-from { font-weight: 700; font-size: 13px; }
.msg-date { font-size: 11px; color: var(--text-muted); }
.msg-text { font-size: 13.5px; }
.msg-unread { background: #e8f0fe; border-left-color: var(--secondary); }

/* ---------- Progress Bar ---------- */
.progress-bar-wrap { background: #f0f0f0; border-radius: 20px; height: 8px; }
.progress-bar { height: 8px; border-radius: 20px; background: var(--primary); transition: width .4s; }

/* ---------- Empty State ---------- */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-muted);
}
.empty-state i { font-size: 48px; margin-bottom: 12px; opacity: .4; }
.empty-state p { font-size: 14px; }

/* ---------- Toast ---------- */
.toast-container {
  position: fixed; bottom: 24px; right: 24px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 9999;
}
.toast {
  background: #323232;
  color: #fff;
  padding: 12px 18px;
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  font-size: 13.5px;
  display: flex; align-items: center; gap: 10px;
  animation: slideRight .25s;
  max-width: 320px;
}
.toast.success { background: var(--secondary); }
.toast.error   { background: var(--danger); }
.toast.info    { background: var(--primary); }

/* ---------- Register Page ---------- */
.register-wrap {
  min-height: 100vh;
  background: linear-gradient(135deg, #0d1b2a 0%, #1a3a5c 100%);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.register-card {
  background: var(--surface);
  border-radius: 16px;
  width: 100%; max-width: 680px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}
.register-header {
  background: var(--primary);
  color: #fff;
  padding: 24px 32px;
}
.register-header h2 { font-size: 20px; font-weight: 800; }
.register-header p  { opacity: .85; font-size: 13px; margin-top: 4px; }
.register-body { padding: 32px; }
.role-selector {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.role-option {
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: all .2s;
  text-align: center;
}
.role-option:hover { border-color: var(--primary); background: #f0f4ff; }
.role-option.selected { border-color: var(--primary); background: #e8f0fe; }
.role-option .role-icon { font-size: 28px; margin-bottom: 6px; }
.role-option .role-name { font-weight: 700; font-size: 14px; }
.role-option .role-desc { color: var(--text-muted); font-size: 11.5px; margin-top: 2px; }

/* ---------- Animações ---------- */
@keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes slideRight { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ---------- Responsive ---------- */
@media (max-width: 768px) {
  .sidebar { width: 0; overflow: hidden; }
  .layout.sidebar-open .sidebar { width: 240px; position: fixed; z-index: 200; height: 100vh; top: 0; left: 0; }
  .form-row, .form-row-3 { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .role-selector { grid-template-columns: 1fr 1fr; }
}

/* ---------- Utilitários ---------- */
.d-flex     { display: flex; }
.align-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-8  { gap: 8px; }
.gap-12 { gap: 12px; }
.mt-8   { margin-top: 8px; }
.mt-12  { margin-top: 12px; }
.mt-16  { margin-top: 16px; }
.mb-16  { margin-bottom: 16px; }
.text-center { text-align: center; }
.text-right  { text-align: right; }
.text-muted  { color: var(--text-muted); font-size: 12.5px; }
.fw-700 { font-weight: 700; }
.w-100  { width: 100%; }
.hidden { display: none !important; }
.green { color: var(--secondary); }
.red   { color: var(--danger); }
.blue  { color: var(--primary); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
// =============================================
//  GESTESCOLAR – GERENCIAMENTO DE DADOS (localStorage)
// =============================================

const DB = {
  // ---- Chaves ----
  KEYS: {
    USERS:     'ges_users',
    STUDENTS:  'ges_students',
    CLASSES:   'ges_classes',
    ATTENDANCE:'ges_attendance',
    GRADES:    'ges_grades',
    INVOICES:  'ges_invoices',
    EXPENSES:  'ges_expenses',
    MESSAGES:  'ges_messages',
    BALANCE:   'ges_balance',
  },

  // ---- Helpers ----
  get(key) {
    try { return JSON.parse(localStorage.getItem(key)) || []; }
    catch { return []; }
  },
  set(key, val) {
    localStorage.setItem(key, JSON.stringify(val));
  },
  getObj(key, def = {}) {
    try { return JSON.parse(localStorage.getItem(key)) || def; }
    catch { return def; }
  },

  // ---- Usuários / Funcionários ----
  getUsers()  { return this.get(this.KEYS.USERS); },
  saveUsers(u){ this.set(this.KEYS.USERS, u); },
  addUser(u)  {
    const users = this.getUsers();
    u.id = Date.now().toString();

const Utils = {
  // Formatar moeda BRL
  currency(value) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0);
  },

  // Formatar data
  date(iso) {
    if (!iso) return '–';
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR');
  },

  // Formatar data + hora
  datetime(iso) {
    if (!iso) return '–';
    const d = new Date(iso);
    return d.toLocaleString('pt-BR');
  },

  // Iniciais do nome
  initials(name) {
    if (!name) return '?';
    return name.split(' ').slice(0, 2).map(n => n[0]).join('').toUpperCase();
  },

  // Status badge HTML
  statusBadge(status) {
    const map = {
      pago:     ['green',  'Pago'],
      pendente: ['yellow', 'Pendente'],
      vencido:  ['red',    'Vencido'],
      cancelado:['gray',   'Cancelado'],
      ativo:    ['green',  'Ativo'],
      inativo:  ['gray',   'Inativo'],
      presente: ['green',  'Presente'],
      falta:    ['red',    'Falta'],
    };
    const [color, label] = map[status] || ['gray', status];
    return `<span class="badge badge-${color}">${label}</span>`;
  },

  // Categoria de despesa
  expenseCategory(cat) {
    const map = {
      agua:    { icon: 'fa-droplet',      label: 'Água',        color: 'blue'   },
      luz:     { icon: 'fa-bolt',         label: 'Energia',     color: 'yellow' },
      salario: { icon: 'fa-users',        label: 'Salário',     color: 'purple' },
      imposto: { icon: 'fa-file-invoice', label: 'Imposto',     color: 'red'    },
      outros:  { icon: 'fa-ellipsis',     label: 'Outros',      color: 'gray'   },
    };
    return map[cat] || { icon: 'fa-circle', label: cat, color: 'gray' };
  },

  // Letra de nota
  gradeLabel(grade) {
    if (grade >= 9) return 'A';
    if (grade >= 7) return 'B';
    if (grade >= 5) return 'C';
    if (grade >= 3) return 'D';
    return 'F';
  },

  // Calcular % de presença
  attendancePercent(studentId) {
    const records = DB.getStudentAttendance(studentId);
    if (!records.length) return 0;
    const present = records.filter(r => r.status === 'presente').length;
    return Math.round((present / records.length) * 100);
  },

  // Gerar código PIX fake
  generatePix(amount, name) {
    const rand = Math.random().toString(36).substring(2, 10).toUpperCase();
    return `00020126330014BR.GOV.BCB.PIX0111escola@pix52040000530398654${String(amount.toFixed(2)).replace('.','').padStart(7,'0')}5802BR5913${name.replace(/\s/g,'').substring(0,13).padEnd(13,'X')}6009SAO PAULO62070503${rand}6304${Math.floor(Math.random()*9999).toString().padStart(4,'0')}`;
  },

  // Verificar se boleto vence em ≤5 dias
  isDueSoon(dueDateStr) {
    const due = new Date(dueDateStr);
    const now = new Date();
    const diff = (due - now) / (1000 * 60 * 60 * 24);
    return diff >= 0 && diff <= 5;
  },

  // Verificar se está vencido
  isOverdue(dueDateStr) {
    return new Date(dueDateStr) < new Date();
  },

  // Toast notification
  toast(msg, type = 'default') {
    let container = document.getElementById('toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'toast-container';
      container.className = 'toast-container';
      document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icons = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle', default: 'fa-bell' };
    toast.innerHTML = `<i class="fa-solid ${icons[type] || icons.default}"></i> ${msg}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
  },

  // Modal genérico
  modal(title, bodyHTML, footerHTML = '') {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">${title}</span>
          <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="modal-body">${bodyHTML}</div>
        ${footerHTML ? `<div class="modal-footer">${footerHTML}</div>` : ''}
      </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    return overlay;
  },

  // Confirmar ação
  confirm(msg, onConfirm) {
    const overlay = Utils.modal(
      'Confirmar ação',
      `<p>${msg}</p>`,
      `<button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
       <button class="btn btn-danger" id="confirmBtn">Confirmar</button>`
    );
    overlay.querySelector('#confirmBtn').onclick = () => { onConfirm(); overlay.remove(); };
  },

  // Escapar HTML
  escape(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
};

    return [...common, ...(byRole[role] || [])];
  }
};

const Auth = {
  SESSION_KEY: 'ges_session',

  // Usuário logado
  current() {
    try { return JSON.parse(sessionStorage.getItem(this.SESSION_KEY)); }
    catch { return null; }
  },

  // Login
  login(email, password) {
    const user = DB.findUserByEmail(email.trim().toLowerCase());
    if (!user) return { ok: false, msg: 'E-mail não encontrado.' };
    if (user.password !== password) return { ok: false, msg: 'Senha incorreta.' };
    if (!user.active) return { ok: false, msg: 'Conta inativa. Contate o administrador.' };
    const { password: _, ...safeUser } = user;
    sessionStorage.setItem(this.SESSION_KEY, JSON.stringify(safeUser));
    return { ok: true, user: safeUser };
  },

  // Logout
  logout() {
    sessionStorage.removeItem(this.SESSION_KEY);
    Router.go('login');
  },

  // Verificar autenticação (redireciona se não logado)
  require() {
    const user = this.current();
    if (!user) { Router.go('login'); return null; }
    return user;
  },

  // Labels de perfil
  roleLabel(role) {
    const map = {
      administrativo: 'Administrativo',
      financeiro:     'Financeiro',
      professor:      'Professor(a)',
      pai:            'Responsável',
    };
    return map[role] || role;
  },

  roleIcon(role) {
    const map = {
      administrativo: 'fa-building',
      financeiro:     'fa-dollar-sign',
      professor:      'fa-chalkboard-teacher',
      pai:            'fa-user-group',
    };
    return map[role] || 'fa-user';
  },

  roleBadgeColor(role) {
    const map = {
      administrativo: 'blue',
      financeiro:     'green',
      professor:      'purple',
      pai:            'yellow',
    };
    return map[role] || 'gray';
  }
};

const RegisterPage = {
  _role: '',

  selectRole(el) {
    document.querySelectorAll('.role-option').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    this._role = el.dataset.role;
    document.getElementById('regRole').value = this._role;
    this.renderRoleFields(this._role);
  },

  renderRoleFields(role) {
    const container = document.getElementById('roleSpecificFields');
    if (role === 'professor') {
      const classes = DB.getClasses();
      container.innerHTML = `
        <div class="form-section-title">Dados do Professor</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Disciplina principal *</label>
            <input type="text" class="form-control" id="regSubject" placeholder="Ex: Matemática" />
          </div>
          <div class="form-group">
            <label class="form-label">Turma responsável</label>
            <select class="form-control" id="regClassId">
              <option value="">Nenhuma</option>
              ${classes.map(c => `<option value="${c.id}">${Utils.escape(c.name)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Formação acadêmica</label>
          <input type="text" class="form-control" id="regEducation" placeholder="Ex: Licenciatura em Matemática – USP" />
        </div>
      `;
    } else if (role === 'pai') {
      const students = DB.getStudents();
      container.innerHTML = `
        <div class="form-section-title">Dados do Responsável</div>
        <div class="form-group">
          <label class="form-label">Aluno vinculado</label>
          <select class="form-control" id="regStudentId">
            <option value="">Selecionar aluno</option>
            ${students.map(s => `<option value="${s.id}">${Utils.escape(s.name)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Grau de parentesco</label>
          <select class="form-control" id="regRelationship">
            <option value="pai">Pai</option>
            <option value="mae">Mãe</option>
            <option value="avo">Avô/Avó</option>
            <option value="responsavel">Responsável legal</option>
          </select>
        </div>
      `;
    } else {
      container.innerHTML = '';
    }
  },

  submit(e) {
    e.preventDefault();
    const alertEl = document.getElementById('reg-alert');

    const role = document.getElementById('regRole').value;
    if (!role) {
      alertEl.innerHTML = `<div class="alert alert-danger"><i class="fa-solid fa-circle-exclamation"></i> Selecione uma função antes de prosseguir.</div>`;
      return;
    }

    const password = document.getElementById('regPassword').value;
    const confirm  = document.getElementById('regPasswordConfirm').value;
    if (password !== confirm) {
      alertEl.innerHTML = `<div class="alert alert-danger"><i class="fa-solid fa-circle-exclamation"></i> As senhas não coincidem.</div>`;
      return;
    }

    const email = document.getElementById('regEmail').value.trim().toLowerCase();
    if (DB.findUserByEmail(email)) {
      alertEl.innerHTML = `<div class="alert alert-danger"><i class="fa-solid fa-circle-exclamation"></i> Este e-mail já está cadastrado.</div>`;
      return;
    }

    const userData = {
      name:     document.getElementById('regName').value.trim(),
      email,
      password,
      cpf:      document.getElementById('regCpf').value,
      phone:    document.getElementById('regPhone').value,
      dob:      document.getElementById('regDob').value,
      gender:   document.getElementById('regGender').value,
      role,
      active:   true,
    };

    // Campos específicos
    if (role === 'professor') {
      userData.subject   = document.getElementById('regSubject')?.value || '';
      userData.classId   = document.getElementById('regClassId')?.value || '';
      userData.education = document.getElementById('regEducation')?.value || '';
    } else if (role === 'pai') {
      userData.studentId    = document.getElementById('regStudentId')?.value || '';
      userData.relationship = document.getElementById('regRelationship')?.value || '';
      // Atualizar aluno com parentId
      if (userData.studentId) {
        DB.updateStudent(userData.studentId, { parentId: 'PENDING' }); // será atualizado com ID real
      }
    }

    const created = DB.addUser(userData);

    // Se pai, vincular ID correto ao aluno
    if (role === 'pai' && userData.studentId) {
      DB.updateStudent(userData.studentId, { parentId: created.id, parentEmail: email, parentName: userData.name });
    }

    alertEl.innerHTML = `<div class="alert alert-success"><i class="fa-solid fa-check-circle"></i> Funcionário cadastrado com sucesso!</div>`;
    Utils.toast(`${userData.name} cadastrado(a) com sucesso!`, 'success');
    document.getElementById('registerForm').reset();
    document.querySelectorAll('.role-option').forEach(e => e.classList.remove('selected'));
    document.getElementById('roleSpecificFields').innerHTML = '';
    this._role = '';
    document.getElementById('regRole').value = '';

    setTimeout(() => {
      const cur = Auth.current();
      if (cur && cur.role === 'administrativo') Router.go('admin-staff');
    }, 1500);
  }
};

const AdminSettings = {
  previewLogo(input) {
    if (!input.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('logo-preview').innerHTML =
        `<div style="margin-bottom:8px;padding:8px;border:1.5px solid var(--secondary);border-radius:var(--radius);display:inline-block;">
           <img src="${e.target.result}" style="max-height:70px;max-width:200px;object-fit:contain;display:block;" />
         </div><br>`;
    };
    reader.readAsDataURL(input.files[0]);
  },

  save() {
    const name    = (document.getElementById('cfg-name')?.value         || '').trim();
    const address = (document.getElementById('cfg-address')?.value      || '').trim();
    const phone   = (document.getElementById('cfg-phone')?.value        || '').trim();
    const cnpj    = (document.getElementById('cfg-cnpj')?.value         || '').trim();
    const email   = (document.getElementById('cfg-email')?.value        || '').trim();
    const pixKey  = (document.getElementById('cfg-pix')?.value          || '').trim();
    const postalCode    = (document.getElementById('cfg-postal-code')?.value    || '').trim();
    const addressNumber = (document.getElementById('cfg-address-number')?.value || '').trim();
    const province      = (document.getElementById('cfg-province')?.value       || '').trim();
    const complement    = (document.getElementById('cfg-complement')?.value     || '').trim();
    const city          = (document.getElementById('cfg-city')?.value           || '').trim();
    const state         = (document.getElementById('cfg-state')?.value          || '').trim().toUpperCase();
    const file    = document.getElementById('cfg-logo')?.files[0];
    const current = DB.getObj('ges_school_config') || {};

    const persist = (logo) => {
      DB.set('ges_school_config', JSON.stringify({ ...current, name, address, phone, cnpj, email, pixKey, logo: logo ?? current.logo ?? '' }));
      DB.set('ges_school_data',   JSON.stringify({ ...(DB.getObj('ges_school_data')||{}), cnpj, email, phone, address, postalCode, addressNumber, province, complement, city, state, pixKey }));
      Utils.toast('Configurações salvas com sucesso!', 'success');
      Router.go('admin-settings');
    };

    if (file) {
      const reader = new FileReader();
      reader.onload = e => persist(e.target.result);
      reader.readAsDataURL(file);
    } else {
      persist(null);
    }
  },

  async buscarCep(cep) {
    const digits = cep.replace(/\D/g, '');
    if (digits.length !== 8) return;
    try {
      const res = await fetch(`https://viacep.com.br/ws/${digits}/json/`);
      const d = await res.json();
      if (d.erro) return;
      if (document.getElementById('cfg-address'))  document.getElementById('cfg-address').value  = d.logradouro || '';
      if (document.getElementById('cfg-province')) document.getElementById('cfg-province').value = d.bairro     || '';
      if (document.getElementById('cfg-city'))     document.getElementById('cfg-city').value     = d.localidade || '';
      if (document.getElementById('cfg-state'))    document.getElementById('cfg-state').value    = d.uf         || '';
    } catch (_) {}
  },

  async ativarGateway() {
    const user   = Auth.current();
    const school = DB.getSchool(user?.schoolId);
    if (!school) return;
    if (school.asaasWalletId) { Utils.toast('Gateway já está ativo.', 'info'); return; }

    const missing = [];
    if (!school.cnpj)          missing.push('CNPJ');
    if (!school.email)         missing.push('E-mail');
    if (!school.postalCode)    missing.push('CEP');
    if (!school.address)       missing.push('Endereço');
    if (!school.addressNumber) missing.push('Número');
    if (!school.province)      missing.push('Bairro');
    if (missing.length) { Utils.toast(`Preencha e salve os campos: ${missing.join(', ')}`, 'error'); return; }

    Utils.toast('Criando subconta Asaas...', 'info');
    const result = await AsaasClient.createSubaccount({
      name: school.name, cpfCnpj: school.cnpj, email: school.email,
      phone: school.phone || '', postalCode: school.postalCode,
      address: school.address, addressNumber: school.addressNumber,
      complement: school.complement || '', province: school.province,
      city: school.city || '', state: school.state || '',
    });
    if (!result) return;

    DB.updateSchool(user.schoolId, {
      asaasAccountId: result.id       || '',
      asaasWalletId:  result.walletId || '',
      asaasSubApiKey: result.apiKey   || '',
    });

    Utils.toast('Gateway de Pagamentos ativado com sucesso!', 'success');
    Router.go('admin-settings');
  },

  removeLogo() {
    const cfg = DB.getSchoolConfig();
    DB.saveSchoolConfig({ ...cfg, logo: '' });
    Utils.toast('Logo removida!', 'success');
    Router.go('admin-settings');
  }
};

const FinInvoices = {
  generate() {
    const students = DB.getStudents();
    Utils.modal(
      'Gerar Boleto',
      `<form id="invForm">
        <div class="form-group"><label class="form-label">Aluno *</label>
          <select class="form-control" id="invStudent" required>
            <option value="">Selecione</option>
            ${students.map(s => `<option value="${s.id}" data-fee="${s.monthlyFee}" data-due="${s.dueDay}">${Utils.escape(s.name)}</option>`).join('')}
          </select></div>
        <div class="form-group"><label class="form-label">Descrição *</label>
          <input class="form-control" id="invDesc" placeholder="Ex: Mensalidade Abril/2026" required /></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Valor (R$) *</label>
            <input type="number" class="form-control" id="invAmount" min="0" step="0.01" required /></div>
          <div class="form-group"><label class="form-label">Vencimento *</label>
            <input type="date" class="form-control" id="invDue" required /></div>
        </div>
      </form>`,
      `<button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
       <button class="btn btn-primary" onclick="FinInvoices.save()"><i class="fa-solid fa-floppy-disk"></i> Gerar</button>`
    );
    document.getElementById('invStudent').addEventListener('change', function() {
      const opt = this.options[this.selectedIndex];
      document.getElementById('invAmount').value = opt.dataset.fee || '';
      const day = opt.dataset.due;
      if (day) {
        const d = new Date();
        d.setDate(parseInt(day));
        document.getElementById('invDue').value = d.toISOString().split('T')[0];
      }
    });
  },
  save() {
    const sEl = document.getElementById('invStudent');
    const student = DB.getStudents().find(s => s.id === sEl.value);
    if (!student) { Utils.toast('Selecione um aluno.','error'); return; }
    DB.addInvoice({
      studentId:   student.id,
      studentName: student.name,
      description: document.getElementById('invDesc').value,
      amount:      parseFloat(document.getElementById('invAmount').value),
      dueDate:     document.getElementById('invDue').value,
    });
    Utils.toast('Boleto gerado com sucesso!','success');
    document.querySelector('.modal-overlay')?.remove();
    window._renderInv?.('todos');
  },
  markPaid(id) {
    const inv = DB.getInvoices().find(i => i.id === id);
    if (!inv) return;
    DB.updateInvoice(id, { status: 'pago', paidAt: new Date().toISOString() });
    DB.addTransaction('credit', inv.amount, `Recebimento – ${inv.studentName} – ${inv.description}`);
    Utils.toast('Boleto marcado como pago! Saldo atualizado.','success');
    window._renderInv?.('todos');
  },
  sendReminder(id) {
    const inv = DB.getInvoices().find(i => i.id === id);
    Utils.toast(`Lembrete enviado para ${inv.studentName}!`,'info');
  }
};

const FinExpenses = {
  openNew() {
    Utils.modal(
      'Nova Despesa',
      `<form id="expForm">
        <div class="form-group"><label class="form-label">Categoria *</label>
          <select class="form-control" id="expCat" required>
            <option value="agua">Água</option>
            <option value="luz">Energia Elétrica</option>
            <option value="salario">Salários</option>
            <option value="imposto">Impostos</option>
            <option value="outros">Outros</option>
          </select></div>
        <div class="form-group"><label class="form-label">Descrição *</label>
          <input class="form-control" id="expDesc" placeholder="Ex: Conta de água – Março/2026" required /></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Valor (R$) *</label>
            <input type="number" class="form-control" id="expAmount" min="0" step="0.01" required /></div>
          <div class="form-group"><label class="form-label">Vencimento *</label>
            <input type="date" class="form-control" id="expDue" required /></div>
        </div>
      </form>`,
      `<button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
       <button class="btn btn-primary" onclick="FinExpenses.save()"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>`
    );
  },
  save() {
    const data = {
      category:    document.getElementById('expCat').value,
      description: document.getElementById('expDesc').value.trim(),
      amount:      parseFloat(document.getElementById('expAmount').value),
      dueDate:     document.getElementById('expDue').value,
    };
    if (!data.description || !data.amount || !data.dueDate) {
      Utils.toast('Preencha todos os campos.','error'); return;
    }
    DB.addExpense(data);
    Utils.toast('Despesa cadastrada!','success');
    document.querySelector('.modal-overlay')?.remove();
    window._reloadExpenses?.();
  },
  markPaid(id) {
    const exp = DB.getExpenses().find(e => e.id === id);
    DB.updateExpense(id, { status: 'pago', paidAt: new Date().toISOString() });
    DB.addTransaction('debit', exp.amount, exp.description);
    Utils.toast('Despesa marcada como paga. Saldo debitado.','success');
    window._reloadExpenses?.();
  },
  remove(id) {
    Utils.confirm('Excluir esta despesa?', () => {
      DB.deleteExpense(id);
      Utils.toast('Despesa removida.','success');
      window._reloadExpenses?.();
    });
  }
};

Router.register('teacher-grades', () => {
  const user = Auth.require(); if (!user) return;
  const myClass = DB.getClasses().find(c => c.id === user.classId);
  const students = myClass ? DB.getStudents().filter(s => s.classId === myClass.id) : [];
  const subjects = ['Matemática','Português','Ciências','História','Geografia','Artes','Educação Física'];
  const periods  = ['Bimestre 1','Bimestre 2','Bimestre 3','Bimestre 4'];

  const renderGrades = (period = 'Bimestre 1') => {
    const grades = DB.getGrades();
    return `
      <div class="card">
        <div class="card-header">
          <span class="card-title"><i class="fa-solid fa-star"></i> Avaliações – ${myClass ? Utils.escape(myClass.name) : '–'}</span>
          <select class="form-control" style="width:auto;" onchange="window._renderGrades(this.value)">
            ${periods.map(p => `<option ${p===period?'selected':''}>${p}</option>`).join('')}
          </select>
        </div>
        ${students.length === 0 ? `<div class="empty-state"><i class="fa-solid fa-star"></i><p>Nenhum aluno na turma.</p></div>` : `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Aluno</th>
                ${subjects.map(s => `<th style="text-align:center;">${s}</th>`).join('')}
                <th style="text-align:center;">Média</th>
              </tr>
            </thead>
            <tbody>
              ${students.map(s => {
                const studentGrades = subjects.map(sub => {
                  const g = grades.find(g => g.studentId === s.id && g.subject === sub && g.period === period);
                  return g ? g.grade : null;
                });
                const validGrades = studentGrades.filter(g => g !== null);
                const avg = validGrades.length ? (validGrades.reduce((a,b)=>a+b,0)/validGrades.length).toFixed(1) : null;
                return `<tr>
                  <td><strong>${Utils.escape(s.name)}</strong></td>
                  ${subjects.map((sub, idx) => {
                    const g = studentGrades[idx];
                    const letter = g !== null ? Utils.gradeLabel(g) : '';
                    return `<td style="text-align:center;">
                      <div class="grade-badge grade-${letter || 'F'}" style="${g===null?'opacity:.3':''}"
                           onclick="TeacherGrades.editGrade('${s.id}','${sub}','${period}','${g||''}')"
                           title="Clique para editar"
                           style="cursor:pointer;${g===null?'opacity:.3':''}">
                        ${g !== null ? g : '–'}
                      </div>
                    </td>`;
                  }).join('')}
                  <td style="text-align:center;">
                    ${avg !== null ? `<div class="grade-badge grade-${Utils.gradeLabel(parseFloat(avg))}">${avg}</div>` : '<span class="text-muted">–</span>'}
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
        <p class="text-muted mt-8">Clique em qualquer nota para editar.</p>`}
      </div>
    `;
  };

  window._renderGrades = (period) => {
    document.getElementById('page-content').innerHTML = renderGrades(period);
  };
  Router.renderLayout(user, 'teacher-grades', renderGrades());
});

const TeacherGrades = {
  editGrade(studentId, subject, period, current) {
    const s = DB.getStudents().find(s => s.id === studentId);
    const overlay = Utils.modal(
      `Nota – ${s?.name || ''} – ${subject}`,
      `<div class="form-group">
        <label class="form-label">Período: ${period}</label>
        <label class="form-label" style="margin-top:12px;">Nota (0 a 10) *</label>
        <input type="number" class="form-control" id="gradeValue"
               value="${current}" min="0" max="10" step="0.1" />
      </div>`,
      `<button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
       <button class="btn btn-primary" onclick="TeacherGrades.save('${studentId}','${subject}','${period}')">
         <i class="fa-solid fa-floppy-disk"></i> Salvar
       </button>`
    );
  },
  save(studentId, subject, period) {
    const user  = Auth.current();
    const value = parseFloat(document.getElementById('gradeValue').value);
    if (isNaN(value) || value < 0 || value > 10) {
      Utils.toast('Nota deve ser entre 0 e 10.','error'); return;
    }
    DB.setGrade(studentId, subject, period, value, user.id);
    const s = DB.getStudents().find(s => s.id === studentId);
    // Notificar pai
    if (s?.parentId) {
      DB.addMessage({
        fromUserId: user.id,
        fromName:   user.name + ' (Professor)',
        toUserId:   s.parentId,
        subject:    `Nota lançada – ${subject} – ${period}`,
        text:       `Olá! A nota de ${s.name} em ${subject} (${period}) foi lançada: ${value}. ${value >= 7 ? 'Parabéns pelo desempenho!' : 'Encorajamos mais dedicação nos estudos.'}`
      });
    }
    Utils.toast('Nota salva e responsável notificado!','success');
    document.querySelector('.modal-overlay')?.remove();
    const sel = document.querySelector('.page-content select');
    window._renderGrades?.(sel?.value || 'Bimestre 1');
  }
};

const TeacherMessages = {
  send(e) {
    e.preventDefault();
    const user      = Auth.current();
    const studentId = document.getElementById('msgTo').value;
    const student   = DB.getStudents().find(s => s.id === studentId);
    if (!student) { Utils.toast('Selecione um aluno.','error'); return; }
    if (!student.parentId) { Utils.toast('Este aluno não possui responsável vinculado.','error'); return; }
    DB.addMessage({
      fromUserId: user.id,
      fromName:   user.name + ' (Professor)',
      toUserId:   student.parentId,
      subject:    document.getElementById('msgSubject').value,
      text:       document.getElementById('msgText').value,
    });

Router.register('parent-invoices', async () => {

  if (!student) { Router.renderLayout(user, 'parent-invoices', `<div class="card"><div class="empty-state"><i class="fa-solid fa-user-graduate"></i><p>Nenhum aluno vinculado.</p></div></div>`); return; }

  // Sincroniza com o Supabase para pegar pagamentos confirmados pelo webhook
  await DB.refreshInvoices?.();

  const invoices = DB.getStudentInvoices(student.id);
  const today      = new Date();
  const year       = today.getFullYear();
  const monthIdx   = today.getMonth();
  const monthKey   = `${year}-${String(monthIdx + 1).padStart(2, '0')}`;
  const MONTHS     = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  const proximoPagamento = invoices.find(i => i.dueDate && i.dueDate.startsWith(monthKey) && i.status !== 'pago');

  const pendentes = invoices
    .filter(i => i.status !== 'pago' && i.dueDate && !i.dueDate.startsWith(monthKey))
    .sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));

  const pagos = invoices
    .filter(i => i.status === 'pago')
    .sort((a, b) => new Date(b.paidAt || b.dueDate) - new Date(a.paidAt || a.dueDate));

  function monthLabel(dateStr) {
    if (!dateStr) return '–';
    const [y, m] = dateStr.split('-');
    return `${MONTHS[parseInt(m, 10) - 1]} / ${y}`;
  }

  function pendingRow(inv) {
    const overdue = Utils.isOverdue(inv.dueDate);
    const color = overdue ? 'var(--danger)' : '#f9a825';
    const bg    = overdue ? '#fdecea' : '#fff8e1';
    const icon  = overdue ? 'fa-triangle-exclamation' : 'fa-clock';
    const label = overdue ? 'Vencido' : 'Pendente';
    return `<div style="display:flex;align-items:center;gap:12px;padding:14px 16px;

      </div>
      <div style="font-size:14px;font-weight:600;">
        <i class="fa-solid fa-circle-check"></i> Sem pagamento pendente para ${MONTHS[monthIdx]} / ${year}

  Router.renderLayout(user, 'parent-invoices', `

const ParentInvoices = {
  _pollTimer: null,

  async payPix(invId) {
    const inv = DB.getInvoices().find(i => i.id === invId);
    if (!inv) return;

    // Se já tem cobrança Asaas, tentar buscar QR existente
    if (inv.asaasId) {
      Utils.toast('Buscando QR Code...', 'info');
      const qr = await AsaasClient.getPixQrCode(inv.asaasId);
      if (qr && qr.payload) {
        this._showPixModal(inv, qr.payload, qr.encodedImage);
        this._startPaymentPolling(inv);
        return;
      }
      // QR existente inválido — limpa e regenera
      DB.updateInvoice(invId, { asaasId: null });
    }

    // Gerar nova cobrança Asaas
    const student = DB.getStudents().find(s => s.id === inv.studentId);
    const school = DB.getSchool(DB._schoolId);
    if (!student) { Utils.toast('Aluno não encontrado.', 'error'); return; }
    if (!school) { Utils.toast('Escola não encontrada.', 'error'); return; }

    Utils.toast('Gerando cobrança PIX...', 'info');
    const result = await AsaasClient.chargeInvoice(inv, student, school);
    if (!result) return; // erro já foi exibido pelo chargeInvoice

    const updated = DB.getInvoices().find(i => i.id === invId);
    this._showPixModal(updated, result.pixCopiaECola, result.pixQrCodeBase64);
    this._startPaymentPolling(updated);
  },

  // Polling: a cada 5s verifica se o pagamento foi confirmado no Asaas.
  _startPaymentPolling(inv) {
    if (this._pollTimer) clearInterval(this._pollTimer);
    if (!inv.asaasId) return;
    let tries = 0;
    const maxTries = 60; // 5 minutos
    this._pollTimer = setInterval(async () => {
      tries++;
      if (tries > maxTries || !document.querySelector('.modal-overlay')) {
        clearInterval(this._pollTimer);
        this._pollTimer = null;
        return;
      }
      try {
        const payment = await AsaasClient.getPayment(inv.asaasId);
        if (payment && (payment.status === 'RECEIVED' || payment.status === 'CONFIRMED')) {
          clearInterval(this._pollTimer);
          this._pollTimer = null;
          DB.updateInvoice(inv.id, {
            status: 'pago',
            paidAt: payment.confirmedDate || payment.paymentDate || new Date().toISOString(),
          });
          await DB.refreshInvoices?.();
          document.querySelector('.modal-overlay')?.remove();
          Utils.toast('Pagamento confirmado! Obrigado.', 'success');
          Router.go('parent-invoices');
        }
      } catch (e) { /* silencioso */ }
    }, 5000);
  },

  // Gera recibo PDF do pagamento
  emitirRecibo(invId) {
    const inv = DB.getInvoices().find(i => i.id === invId);
    if (!inv) { Utils.toast('Cobrança não encontrada.', 'error'); return; }
    if (inv.status !== 'pago') { Utils.toast('Apenas pagamentos confirmados.', 'error'); return; }

    const student = DB.getStudents().find(s => s.id === inv.studentId);
    const school  = DB.getSchool(inv.schoolId || DB._schoolId);

    if (!window.jspdf) { Utils.toast('Biblioteca PDF não carregada.', 'error'); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    const W = 210;

    doc.setFillColor(26, 115, 232);
    doc.rect(0, 0, W, 28, 'F');
    doc.setTextColor(255);
    doc.setFontSize(18); doc.setFont(undefined, 'bold');
    doc.text('RECIBO DE PAGAMENTO', W / 2, 12, { align: 'center' });
    doc.setFontSize(10); doc.setFont(undefined, 'normal');
    doc.text(school?.name || 'Escola', W / 2, 20, { align: 'center' });

    doc.setTextColor(0);
    let y = 44;
    doc.setFontSize(10);
    const linha = (label, valor) => {
      doc.setFont(undefined, 'bold'); doc.text(label, 18, y);
      doc.setFont(undefined, 'normal'); doc.text(String(valor || '–'), 70, y);
      y += 7;
    };

    linha('Recibo nº:', inv.id.substring(0, 8).toUpperCase());
    linha('Data do pagamento:', Utils.date(inv.paidAt || inv.dueDate));
    linha('Aluno:', student?.name || inv.studentName);
    linha('Matrícula:', student?.matricula || '–');
    linha('Descrição:', inv.description || '–');
    linha('Vencimento:', Utils.date(inv.dueDate));
    linha('Forma de pagamento:', inv.paymentMethod === 'pix_asaas' ? 'PIX (Asaas)' : 'PIX');

    y += 4;
    doc.setDrawColor(220);
    doc.line(18, y, W - 18, y);
    y += 10;

    doc.setFontSize(12); doc.setFont(undefined, 'bold');
    doc.text('VALOR PAGO:', 18, y);
    doc.setFontSize(16); doc.setTextColor(26, 115, 232);
    doc.text(Utils.currency(inv.amount), W - 18, y, { align: 'right' });

    y += 18;
    doc.setTextColor(80); doc.setFontSize(9); doc.setFont(undefined, 'normal');
    const txtRecibo = `Recebemos de ${student?.parentName || student?.name || ''} a importância de ${Utils.currency(inv.amount)} referente a ${inv.description || 'serviços educacionais'}, dando plena, geral e irrevogável quitação.`;
    const lines = doc.splitTextToSize(txtRecibo, W - 36);
    doc.text(lines, 18, y);
    y += lines.length * 5 + 18;

    doc.line(W / 2 - 40, y, W / 2 + 40, y);
    y += 5;
    doc.setFontSize(9); doc.text(school?.name || 'Escola', W / 2, y, { align: 'center' });

    doc.setTextColor(160); doc.setFontSize(7);
    doc.text(`Documento gerado em ${new Date().toLocaleString('pt-BR')} · GestEscolar`, W / 2, 285, { align: 'center' });

    doc.save(`recibo_${(student?.name || 'aluno').replace(/\s+/g, '_')}_${(inv.paidAt || inv.dueDate).slice(0, 10)}.pdf`);
    Utils.toast('Recibo gerado!', 'success');
  },

  _showPixModal(inv, copiaECola, qrBase64) {
    Utils.modal(
      `Pagar via PIX – ${Utils.escape(inv.description)}`,
      `<div style="text-align:center;">
        <div style="font-size:32px;font-weight:900;color:var(--secondary);margin-bottom:4px;">${Utils.currency(inv.amount)}</div>
        <div class="text-muted">Vencimento: ${Utils.date(inv.dueDate)}</div>
        <div style="margin:20px 0;">
          <div style="font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:8px;">QR CODE PIX</div>
          ${qrBase64
            ? `<img src="data:image/png;base64,${qrBase64}" style="width:160px;height:160px;margin:0 auto;display:block;border-radius:12px;" />`
            : `<div style="width:160px;height:160px;background:linear-gradient(135deg,#1a73e8,#34a853);border-radius:12px;margin:0 auto;display:flex;align-items:center;justify-content:center;">
                <i class="fa-solid fa-qrcode" style="font-size:80px;color:#fff;opacity:.9;"></i>
              </div>`}
        </div>
        <div style="font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:4px;">Código PIX Copia e Cola</div>
        <div style="display:flex;gap:6px;align-items:stretch;">
          <input id="parentPixCode" class="form-control" value="${Utils.escape(copiaECola || '')}" readonly style="font-size:11px;font-family:monospace;flex:1;" />
          <button type="button" class="btn btn-outline btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('parentPixCode').value);Utils.toast('PIX copiado!','success');" title="Copiar">
            <i class="fa-solid fa-copy"></i>
          </button>
        </div>
        <div class="alert alert-info" style="text-align:left;font-size:12px;margin-top:12px;">
          <i class="fa-solid fa-info-circle"></i>
          O saldo será creditado diretamente na conta individual da escola e ficará disponível automaticamente.
        </div>
      </div>`,
      `<button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Fechar</button>
       <button class="btn btn-primary" onclick="navigator.clipboard.writeText(document.getElementById('parentPixCode').value);Utils.toast('PIX copiado!','success');">
         <i class="fa-solid fa-copy"></i> Copiar PIX
       </button>`
    );
  },
  confirmPix(invId) {
    const inv = DB.getInvoices().find(i => i.id === invId);
    DB.updateInvoice(invId, { status: 'pago', paidAt: new Date().toISOString() });
    DB.addTransaction('credit', inv.amount, `PIX – ${inv.studentName} – ${inv.description}`);
    Utils.toast('Pagamento PIX confirmado! Obrigado.','success');
    document.querySelector('.modal-overlay')?.remove();
    Router.go('parent-invoices');
  },
  copy(invId) {
    const inv     = DB.getInvoices().find(i => i.id === invId);
    const pixCode = Utils.generatePix(inv.amount, inv.studentName);
    Utils.modal(
      `2ª Via – ${Utils.escape(inv.description)}`,
      `<p style="margin-bottom:12px;">Segunda via do boleto gerada com sucesso.</p>
       <div class="pix-code-box">${pixCode}</div>
       <div class="text-muted">Use o código acima para pagamento via PIX ou internet banking.</div>`,
      `<button class="btn btn-primary" onclick="this.closest('.modal-overlay').remove()">Fechar</button>`
    );
  }
};

// --- Mensagens do pai ---
Router.register('parent-messages', () => {
  const user = Auth.require(); if (!user) return;
  const messages = DB.getMessagesForUser(user.id).sort((a,b) => new Date(b.sentAt)-new Date(a.sentAt));
  messages.forEach(m => DB.markMessageRead(m.id));

  const content = `
    <div class="card">
      <div class="card-header">
        <span class="card-title"><i class="fa-solid fa-envelope"></i> Mensagens do Professor</span>
        <span class="badge badge-blue">${messages.length} mensagem(ns)</span>
      </div>
      ${messages.length === 0 ? `<div class="empty-state"><i class="fa-solid fa-envelope"></i><p>Nenhuma mensagem recebida.</p></div>` :
        `<div class="msg-list">
          ${messages.map(m => `
            <div class="msg-item ${m.read?'':'msg-unread'}">
              <div class="msg-header">
                <span class="msg-from"><i class="fa-solid fa-chalkboard-teacher"></i> ${Utils.escape(m.fromName)}</span>
                <span class="msg-date">${Utils.datetime(m.sentAt)}</span>
              </div>
              <div style="font-weight:700;margin-bottom:4px;">${Utils.escape(m.subject)}</div>
              <div class="msg-text">${Utils.escape(m.text)}</div>
            </div>`).join('')}
        </div>`}
    </div>
  `;
  Router.renderLayout(user, 'parent-messages', content);
});

  const invoices = DB.getInvoices();
  const dueSoon  = invoices.filter(i => i.status === 'pendente' && Utils.isDueSoon(i.dueDate));
  if (dueSoon.length > 0) {
    console.log(`[GestEscolar] ${dueSoon.length} boleto(s) com vencimento próximo – notificações automáticas enviadas!`);
    dueSoon.forEach(inv => {
      console.log(`  → ${inv.studentName}: ${inv.description} (vence ${inv.dueDate})`);
    });
  }
}
